{% extends "base.html" %}
{% set active_page = 'register_asset' %}
{% block page_title %}<h1 class="page-title">Register Machine</h1>{% endblock %}
{% block topbar_extra %}{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <span class="card-title">New Machine</span>
    </div>

    <form method="POST">
        <div class="form-grid">
            <div class="form-group">
                <label for="name">Machine Number *</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="form-group">
    <label for="type">Type</label>
    <select id="type" name="type" required>
        <option value="">— Selecteer type —</option>
        <option value="auto">Auto</option>
        <option value="pickup">Pickup</option>
        <option value="truck">Truck</option>
        <option value="grafmachine">Grafmachine</option>
        <option value="bulldozer">Bulldozer</option>
    </select>
</div>

         <div class="form-group">
    <label for="brand">Brand</label>
    <select id="brand" name="brand_id" required>
        <option value="">— Select brand —</option>
        {% for brand in brands %}
        <option value="{{ brand.Brand_ID }}">{{ brand.Name }}</option>
        {% endfor %}
    </select>
</div>
            <div class="form-group">
                <label for="model">Model</label>
                <input type="text" id="model" name="model">
            </div>

            <div class="form-group">
                <label for="year">Year Built</label>
                <input type="number" id="year" name="year" min="1900" max="2100">
            </div>
<div class="form-group">
    <label for="status">Status</label>
    <select id="status" name="status" required>
        <option value="">— Selecteer status —</option>
        <option value="Active">Active</option>
        <option value="Inactive">Inactive</option>
    </select>
</div>
            <div class="form-group">
                <label for="chasis_number">Chasisnumber</label>
                <input type="text" id="chasis_number" name="chasis_number">
            </div>

            <div class="form-group">
                <label for="plaat_nummer">Platenumber</label>
                <input type="text" id="plaat_nummer" name="plaat_nummer">
            </div>

            <div class="form-group">
                <label for="kilometerstand">Mileage</label>
                <input type="number" step="0.01" id="kilometerstand" name="kilometerstand">
            </div>

            <div class="form-group">
                <label for="register_date">Registration Date</label>
                <input type="date" id="register_date" name="register_date">
            </div>
        </div>

        <button type="submit" class="btn-primary">Save Machine</button>
    </form>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    document.getElementById('register_date').valueAsDate = new Date();
</script>
{% endblock %}
